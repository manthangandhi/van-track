<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f5645" />
  <meta name="description" content="VanTrack — GPS-verified field attendance for forest conservation teams" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="VanTrack" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>VanTrack</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <!-- GitHub Pages SPA redirect restore (see scripts/prepare-gh-pages.mjs) -->
  <script type="text/javascript">
    (function (location) {
      if (location.search[1] === '/') {
        var decoded = location.search
          .slice(1)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&')
          })
          .join('?')
        window.history.replaceState(
          null,
          null,
          location.pathname.slice(0, -1) + decoded + location.hash
        )
      }
    })(window.location)
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
